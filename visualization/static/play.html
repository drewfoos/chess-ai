<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess AI -- Play Against Engine</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet"
          href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-card: #161627;
            --bg-card-hover: #1a1a30;
            --border: #2a2a4a;
            --border-accent: #3a3a6a;
            --accent: #6c63ff;
            --accent-light: #8b83ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --text: #e8e8f0;
            --text-muted: #8888a0;
            --text-dim: #555570;
            --success: #4ecdc4;
            --danger: #ff6b6b;
            --warning: #ffd93d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            background: linear-gradient(180deg, rgba(108, 99, 255, 0.08) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .header h1 span { color: var(--accent); }
        .header .back-link {
            font-size: 0.85em;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .back-link:hover { color: var(--accent-light); }

        /* Main layout */
        .main {
            max-width: 1100px;
            margin: 28px auto;
            padding: 0 24px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        /* Board area */
        .board-area {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        #board-wrapper {
            width: 480px;
            flex-shrink: 0;
        }
        #board { width: 100%; }

        /* Eval bar */
        .eval-bar {
            width: 28px;
            height: 480px;
            background: #333;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .eval-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: #e8e8f0;
            transition: height 0.5s ease;
        }
        .eval-black {
            position: absolute;
            top: 0;
            width: 100%;
            height: 50%;
            background: #222;
            transition: height 0.5s ease;
        }
        .eval-score {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 700;
            z-index: 2;
            color: #999;
            writing-mode: vertical-lr;
            text-orientation: mixed;
            white-space: nowrap;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        .eval-mid-line {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 1px;
            background: rgba(108, 99, 255, 0.5);
            z-index: 1;
        }

        /* Side panel */
        .side-panel {
            flex: 1;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 18px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--border-accent); }
        .card h2 {
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        /* Engine info */
        .engine-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .engine-stat {
            text-align: center;
        }
        .engine-stat .label {
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            margin-bottom: 2px;
        }
        .engine-stat .value {
            font-size: 1.3em;
            font-weight: 700;
        }
        .engine-stat .value.score-positive { color: var(--success); }
        .engine-stat .value.score-negative { color: var(--danger); }
        .engine-stat .value.score-neutral { color: var(--text-muted); }

        /* Thinking indicator */
        .thinking {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            font-size: 0.85em;
            color: var(--accent-light);
        }
        .thinking.active { display: flex; }
        .thinking-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: thinking-bounce 1.4s ease-in-out infinite both;
        }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0s; }
        @keyframes thinking-bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Move history */
        .move-history {
            max-height: 220px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-accent) transparent;
        }
        .move-history::-webkit-scrollbar { width: 5px; }
        .move-history::-webkit-scrollbar-track { background: transparent; }
        .move-history::-webkit-scrollbar-thumb {
            background: var(--border-accent);
            border-radius: 3px;
        }
        .move-history table {
            width: 100%;
            border-collapse: collapse;
        }
        .move-history td {
            padding: 4px 8px;
            font-size: 0.85em;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .move-history td:hover { background: var(--accent-glow); }
        .move-history td.active {
            background: var(--accent);
            color: white;
        }
        .move-history .move-num {
            color: var(--text-dim);
            width: 32px;
            text-align: right;
            cursor: default;
            font-weight: 600;
        }
        .move-history .move-num:hover { background: transparent; }
        .move-history .white-move { color: var(--text); }
        .move-history .black-move { color: var(--text-muted); }
        .move-history .empty { color: transparent; cursor: default; }
        .move-history .empty:hover { background: transparent; }

        /* Game status */
        .game-status {
            text-align: center;
            font-size: 0.9em;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 8px;
            display: none;
        }
        .game-status.active { display: block; }
        .game-status.check {
            color: var(--warning);
            background: rgba(255, 217, 61, 0.1);
            border: 1px solid rgba(255, 217, 61, 0.2);
        }
        .game-status.gameover {
            color: var(--accent-light);
            background: var(--accent-glow);
            border: 1px solid rgba(108, 99, 255, 0.3);
        }

        /* Controls */
        .controls-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .controls-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--bg-primary);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.82em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .btn:hover {
            background: var(--accent-glow);
            color: var(--accent-light);
            border-color: var(--accent);
        }
        .btn:active {
            background: var(--accent);
            color: white;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn:disabled:hover {
            background: var(--bg-primary);
            color: var(--text-muted);
            border-color: var(--border);
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: var(--accent-light);
            border-color: var(--accent-light);
            color: white;
        }

        .control-select {
            background: var(--bg-primary);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.82em;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .control-select:hover { border-color: var(--accent); }
        .control-select:focus { outline: none; border-color: var(--accent); }

        .control-label {
            font-size: 0.75em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-right: 2px;
        }

        /* Radio buttons */
        .radio-group {
            display: flex;
            gap: 2px;
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 2px;
            border: 1px solid var(--border);
        }
        .radio-group label {
            padding: 6px 14px;
            font-size: 0.82em;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .radio-group input[type="radio"] { display: none; }
        .radio-group input[type="radio"]:checked + label {
            background: var(--accent);
            color: white;
        }
        .radio-group label:hover {
            background: var(--accent-glow);
            color: var(--accent-light);
        }

        /* Last move highlight */
        .highlight-move {
            background-color: rgba(108, 99, 255, 0.3) !important;
        }

        /* Error toast */
        .error-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 107, 107, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 500;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .error-toast.active { display: block; }

        /* Responsive */
        @media (max-width: 900px) {
            .main {
                flex-direction: column;
                align-items: center;
            }
            .board-area {
                justify-content: center;
            }
            #board-wrapper { width: 360px; }
            .eval-bar { height: 360px; }
            .side-panel {
                width: 100%;
                max-width: 480px;
            }
        }
        @media (max-width: 500px) {
            .header { padding: 14px 16px; }
            .header h1 { font-size: 1.2em; }
            .main { padding: 0 12px; }
            #board-wrapper { width: 300px; }
            .eval-bar { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>ChessAI</span> -- Play Against Engine</h1>
        <a href="/" class="back-link">&larr; Back to Dashboard</a>
    </div>

    <div class="main">
        <div class="board-area">
            <div id="board-wrapper">
                <div id="board"></div>
            </div>
            <div class="eval-bar" id="eval-bar">
                <div class="eval-black" id="eval-black"></div>
                <div class="eval-fill" id="eval-fill"></div>
                <div class="eval-mid-line"></div>
                <span class="eval-score" id="eval-score">0.0</span>
            </div>
        </div>

        <div class="side-panel">
            <div class="card">
                <h2>Engine Info</h2>
                <div class="thinking" id="thinking">
                    Engine thinking
                    <div class="thinking-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="engine-stats">
                    <div class="engine-stat">
                        <div class="label">Score</div>
                        <div class="value score-neutral" id="info-score">0.00</div>
                    </div>
                    <div class="engine-stat">
                        <div class="label">Nodes</div>
                        <div class="value" id="info-nodes">--</div>
                    </div>
                    <div class="engine-stat">
                        <div class="label">NPS</div>
                        <div class="value" id="info-nps">--</div>
                    </div>
                    <div class="engine-stat">
                        <div class="label">Depth</div>
                        <div class="value" id="info-depth">--</div>
                    </div>
                </div>
            </div>

            <div class="game-status" id="game-status"></div>

            <div class="card">
                <h2>Move History</h2>
                <div class="move-history" id="move-history">
                    <table id="move-table">
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>Controls</h2>
                <div class="controls-grid">
                    <div class="controls-row">
                        <button class="btn btn-primary" id="btn-new">New Game</button>
                        <button class="btn" id="btn-flip">Flip Board</button>
                        <button class="btn" id="btn-undo">Undo</button>
                    </div>
                    <div class="controls-row">
                        <span class="control-label">Think:</span>
                        <select class="control-select" id="think-time">
                            <option value="500">0.5s</option>
                            <option value="1000" selected>1s</option>
                            <option value="2000">2s</option>
                            <option value="5000">5s</option>
                            <option value="10000">10s</option>
                        </select>
                    </div>
                    <div class="controls-row">
                        <span class="control-label">Play as:</span>
                        <div class="radio-group">
                            <input type="radio" name="color" id="color-white" value="white" checked>
                            <label for="color-white">White</label>
                            <input type="radio" name="color" id="color-black" value="black">
                            <label for="color-black">Black</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="error-toast" id="error-toast"></div>

<script>
// --- State ---
var chess = new Chess();
var board = null;
var playerColor = 'white';
var engineBusy = false;
var thinkTime = 1000;
var lastMoveFrom = null;
var lastMoveTo = null;
var viewingMoveIdx = -1; // -1 means viewing current position

// --- Board setup ---
function createBoard() {
    if (board) board.destroy();
    board = Chessboard('board', {
        position: chess.fen(),
        orientation: playerColor,
        draggable: true,
        pieceTheme: '/static/img/pieces/{piece}.webp',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    });
}

function onDragStart(source, piece, position, orientation) {
    // Prevent moves when game is over, engine is thinking, or viewing history
    if (chess.game_over()) return false;
    if (engineBusy) return false;
    if (viewingMoveIdx >= 0) return false;

    // Only allow moving own pieces
    if (playerColor === 'white' && piece.search(/^b/) !== -1) return false;
    if (playerColor === 'black' && piece.search(/^w/) !== -1) return false;

    // Only move when it's player's turn
    var turn = chess.turn() === 'w' ? 'white' : 'black';
    if (turn !== playerColor) return false;

    return true;
}

function onDrop(source, target) {
    // Try the move -- handle promotion
    var moveObj = {from: source, to: target};

    // Check if this is a pawn promotion
    var piece = chess.get(source);
    if (piece && piece.type === 'p') {
        var rank = target.charAt(1);
        if ((piece.color === 'w' && rank === '8') || (piece.color === 'b' && rank === '1')) {
            moveObj.promotion = 'q'; // Auto-promote to queen
        }
    }

    var move = chess.move(moveObj);
    if (move === null) return 'snapback';

    lastMoveFrom = source;
    lastMoveTo = target;
    viewingMoveIdx = -1;
    updateMoveHistory();
    updateHighlights();
    updateGameStatus();

    if (!chess.game_over()) {
        engineThink();
    }
}

function onSnapEnd() {
    board.position(chess.fen());
}

// --- Engine communication ---
function engineThink() {
    engineBusy = true;
    document.getElementById('thinking').classList.add('active');

    var moves = getUCIMoves();

    fetch('/api/play/move', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({moves: moves, think_time: thinkTime})
    })
    .then(function(r) {
        if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'Engine error'); });
        return r.json();
    })
    .then(function(data) {
        engineBusy = false;
        document.getElementById('thinking').classList.remove('active');

        if (data.bestmove && data.bestmove !== '(none)' && data.bestmove !== '0000') {
            var from = data.bestmove.substring(0, 2);
            var to = data.bestmove.substring(2, 4);
            var promotion = data.bestmove.length > 4 ? data.bestmove[4] : undefined;
            chess.move({from: from, to: to, promotion: promotion});
            board.position(chess.fen());

            lastMoveFrom = from;
            lastMoveTo = to;
            updateMoveHistory();
            updateHighlights();
            updateEngineInfo(data);
            updateEvalBar(data.score_cp, data.mate);
            updateGameStatus();
        }
    })
    .catch(function(err) {
        engineBusy = false;
        document.getElementById('thinking').classList.remove('active');
        showError(err.message || 'Failed to communicate with engine');
    });
}

function getUCIMoves() {
    var history = chess.history({verbose: true});
    var moves = [];
    for (var i = 0; i < history.length; i++) {
        var m = history[i];
        moves.push(m.from + m.to + (m.promotion || ''));
    }
    return moves;
}

// --- Eval bar ---
function updateEvalBar(scoreCp, mate) {
    var evalFill = document.getElementById('eval-fill');
    var evalBlack = document.getElementById('eval-black');
    var evalScore = document.getElementById('eval-score');
    var pct;
    var scoreText;

    if (mate !== undefined && mate !== null) {
        pct = mate > 0 ? 98 : 2;
        scoreText = (mate > 0 ? 'M' : '-M') + Math.abs(mate);
    } else if (scoreCp !== null && scoreCp !== undefined) {
        // Sigmoid mapping: 50% at 0, ~95% at +400cp
        pct = 50 + 50 * (2 / (1 + Math.exp(-scoreCp / 200)) - 1);
        pct = Math.max(2, Math.min(98, pct));
        var pawns = scoreCp / 100;
        scoreText = (pawns >= 0 ? '+' : '') + pawns.toFixed(1);
    } else {
        pct = 50;
        scoreText = '0.0';
    }

    // White fill goes up from bottom (white winning = taller)
    evalFill.style.height = pct + '%';
    evalBlack.style.height = (100 - pct) + '%';
    evalScore.textContent = scoreText;
}

// --- Engine info panel ---
function updateEngineInfo(data) {
    var scoreEl = document.getElementById('info-score');
    if (data.mate !== undefined && data.mate !== null) {
        scoreEl.textContent = (data.mate > 0 ? 'M' : '-M') + Math.abs(data.mate);
        scoreEl.className = 'value ' + (data.mate > 0 ? 'score-positive' : 'score-negative');
    } else if (data.score_cp !== null && data.score_cp !== undefined) {
        var pawns = data.score_cp / 100;
        scoreEl.textContent = (pawns >= 0 ? '+' : '') + pawns.toFixed(2);
        if (pawns > 0.1) scoreEl.className = 'value score-positive';
        else if (pawns < -0.1) scoreEl.className = 'value score-negative';
        else scoreEl.className = 'value score-neutral';
    }

    var nodesEl = document.getElementById('info-nodes');
    if (data.nodes > 0) {
        nodesEl.textContent = data.nodes >= 1000 ? (data.nodes / 1000).toFixed(1) + 'k' : data.nodes;
    }

    var npsEl = document.getElementById('info-nps');
    if (data.nps > 0) {
        npsEl.textContent = data.nps >= 1000 ? (data.nps / 1000).toFixed(1) + 'k' : data.nps;
    }
}

// --- Move history ---
function updateMoveHistory() {
    var history = chess.history();
    var tbody = document.querySelector('#move-table tbody');
    tbody.innerHTML = '';

    for (var i = 0; i < history.length; i += 2) {
        var tr = document.createElement('tr');

        var numTd = document.createElement('td');
        numTd.className = 'move-num';
        numTd.textContent = Math.floor(i / 2 + 1) + '.';
        tr.appendChild(numTd);

        var whiteTd = document.createElement('td');
        whiteTd.className = 'white-move';
        whiteTd.textContent = history[i];
        whiteTd.dataset.moveIdx = i;
        whiteTd.addEventListener('click', onMoveClick);
        if (viewingMoveIdx === i) whiteTd.classList.add('active');
        tr.appendChild(whiteTd);

        var blackTd = document.createElement('td');
        if (i + 1 < history.length) {
            blackTd.className = 'black-move';
            blackTd.textContent = history[i + 1];
            blackTd.dataset.moveIdx = i + 1;
            blackTd.addEventListener('click', onMoveClick);
            if (viewingMoveIdx === i + 1) blackTd.classList.add('active');
        } else {
            blackTd.className = 'empty';
            blackTd.innerHTML = '&nbsp;';
        }
        tr.appendChild(blackTd);

        tbody.appendChild(tr);
    }

    // Auto-scroll to bottom
    var histDiv = document.getElementById('move-history');
    histDiv.scrollTop = histDiv.scrollHeight;
}

function onMoveClick(e) {
    var idx = parseInt(e.target.dataset.moveIdx);
    if (isNaN(idx)) return;
    navigateToMove(idx);
}

function navigateToMove(idx) {
    var history = chess.history({verbose: true});
    if (idx < 0 || idx >= history.length) return;

    viewingMoveIdx = idx;
    var tempChess = new Chess();
    for (var i = 0; i <= idx; i++) {
        tempChess.move(history[i].san);
    }
    board.position(tempChess.fen());

    lastMoveFrom = history[idx].from;
    lastMoveTo = history[idx].to;
    updateHighlights();

    // Highlight active move in table
    var cells = document.querySelectorAll('#move-table td.white-move, #move-table td.black-move');
    for (var j = 0; j < cells.length; j++) {
        cells[j].classList.remove('active');
        if (parseInt(cells[j].dataset.moveIdx) === idx) {
            cells[j].classList.add('active');
        }
    }
}

// --- Highlights ---
function updateHighlights() {
    // Remove all highlights
    var squares = document.querySelectorAll('#board .square-55d63');
    for (var i = 0; i < squares.length; i++) {
        squares[i].classList.remove('highlight-move');
    }

    if (lastMoveFrom && lastMoveTo) {
        var fromSq = document.querySelector('#board .square-' + lastMoveFrom);
        var toSq = document.querySelector('#board .square-' + lastMoveTo);
        if (fromSq) fromSq.classList.add('highlight-move');
        if (toSq) toSq.classList.add('highlight-move');
    }
}

// --- Game status ---
function updateGameStatus() {
    var statusEl = document.getElementById('game-status');

    if (chess.in_checkmate()) {
        var winner = chess.turn() === 'w' ? 'Black' : 'White';
        statusEl.textContent = 'Checkmate! ' + winner + ' wins.';
        statusEl.className = 'game-status active gameover';
    } else if (chess.in_stalemate()) {
        statusEl.textContent = 'Stalemate -- Draw.';
        statusEl.className = 'game-status active gameover';
    } else if (chess.in_threefold_repetition()) {
        statusEl.textContent = 'Threefold repetition -- Draw.';
        statusEl.className = 'game-status active gameover';
    } else if (chess.insufficient_material()) {
        statusEl.textContent = 'Insufficient material -- Draw.';
        statusEl.className = 'game-status active gameover';
    } else if (chess.in_draw()) {
        statusEl.textContent = 'Draw by fifty-move rule.';
        statusEl.className = 'game-status active gameover';
    } else if (chess.in_check()) {
        statusEl.textContent = 'Check!';
        statusEl.className = 'game-status active check';
    } else {
        statusEl.className = 'game-status';
    }
}

// --- Controls ---
document.getElementById('btn-new').addEventListener('click', function() {
    newGame();
});

document.getElementById('btn-flip').addEventListener('click', function() {
    board.flip();
});

document.getElementById('btn-undo').addEventListener('click', function() {
    if (engineBusy) return;
    // Return to current position if viewing history
    if (viewingMoveIdx >= 0) {
        viewingMoveIdx = -1;
        board.position(chess.fen());
        updateMoveHistory();
        updateHighlights();
        return;
    }
    // Undo both engine and player move
    chess.undo(); // engine move
    chess.undo(); // player move
    board.position(chess.fen());
    var hist = chess.history({verbose: true});
    if (hist.length > 0) {
        var last = hist[hist.length - 1];
        lastMoveFrom = last.from;
        lastMoveTo = last.to;
    } else {
        lastMoveFrom = null;
        lastMoveTo = null;
    }
    viewingMoveIdx = -1;
    updateMoveHistory();
    updateHighlights();
    updateGameStatus();
});

document.getElementById('think-time').addEventListener('change', function() {
    thinkTime = parseInt(this.value);
});

document.querySelectorAll('input[name="color"]').forEach(function(radio) {
    radio.addEventListener('change', function() {
        playerColor = this.value;
        newGame();
    });
});

// Click on board to return to current position
document.getElementById('board-wrapper').addEventListener('dblclick', function() {
    if (viewingMoveIdx >= 0) {
        viewingMoveIdx = -1;
        board.position(chess.fen());
        var hist = chess.history({verbose: true});
        if (hist.length > 0) {
            var last = hist[hist.length - 1];
            lastMoveFrom = last.from;
            lastMoveTo = last.to;
        }
        updateMoveHistory();
        updateHighlights();
    }
});

// --- New game ---
function newGame() {
    chess = new Chess();
    lastMoveFrom = null;
    lastMoveTo = null;
    viewingMoveIdx = -1;
    engineBusy = false;

    createBoard();
    updateMoveHistory();
    updateHighlights();
    updateEvalBar(0, null);
    updateGameStatus();

    // Reset engine info
    document.getElementById('info-score').textContent = '0.00';
    document.getElementById('info-score').className = 'value score-neutral';
    document.getElementById('info-nodes').textContent = '--';
    document.getElementById('info-nps').textContent = '--';
    document.getElementById('info-depth').textContent = '--';
    document.getElementById('thinking').classList.remove('active');

    // Tell server to reset engine
    fetch('/api/play/new', {method: 'POST'}).catch(function() {});

    // If playing as black, engine moves first
    if (playerColor === 'black') {
        engineThink();
    }
}

// --- Error toast ---
function showError(msg) {
    var toast = document.getElementById('error-toast');
    toast.textContent = msg;
    toast.classList.add('active');
    setTimeout(function() { toast.classList.remove('active'); }, 5000);
}

// --- Window resize ---
$(window).resize(function() {
    if (board) board.resize();
    // Update eval bar height to match board
    var boardEl = document.getElementById('board');
    if (boardEl) {
        var h = boardEl.offsetHeight;
        document.getElementById('eval-bar').style.height = h + 'px';
    }
});

// --- Init ---
createBoard();
updateEvalBar(0, null);

// Match eval bar height to board after render
setTimeout(function() {
    var boardEl = document.getElementById('board');
    if (boardEl) {
        var h = boardEl.offsetHeight;
        document.getElementById('eval-bar').style.height = h + 'px';
    }
}, 100);
</script>
