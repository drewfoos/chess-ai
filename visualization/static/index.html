<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess AI Training Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet"
          href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-card: #161627;
            --bg-card-hover: #1a1a30;
            --border: #2a2a4a;
            --border-accent: #3a3a6a;
            --accent: #6c63ff;
            --accent-light: #8b83ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --text: #e8e8f0;
            --text-muted: #8888a0;
            --text-dim: #555570;
            --success: #4ecdc4;
            --danger: #ff6b6b;
            --warning: #ffd93d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: var(--bg-primary); color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 32px 20px 24px;
            background: linear-gradient(180deg, rgba(108, 99, 255, 0.08) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.75em;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .header h1 span { color: var(--accent); }
        .header .subtitle {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-top: 6px;
        }
        .run-switcher {
            margin-top: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            color: var(--text-muted);
        }
        .run-switcher select {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border-accent);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.95em;
            min-width: 240px;
            cursor: pointer;
        }
        .run-switcher select:hover { border-color: var(--accent); }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            overflow: hidden;
        }
        .full-width { grid-column: 1 / -1; }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            grid-column: 1 / -1;
            margin-bottom: 4px;
        }
        .stat-box {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
        }
        .stat-box:hover {
            border-color: var(--border-accent);
            transform: translateY(-1px);
        }
        .stat-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent);
            opacity: 0.6;
        }
        .stat-box .label {
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .stat-box .value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
        }
        .stat-box .unit {
            font-size: 0.7em;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--border-accent); }
        .card h2 {
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card h2 .card-action {
            font-size: 0.85em;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 3px 9px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .card h2 .card-action:hover { color: #fff; border-color: var(--border-accent); }
        .card h2 .card-action.copied { color: #6c63ff; border-color: #6c63ff; }

        /* Charts */
        .chart-container { position: relative; height: 280px; }

        /* Board */
        #board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            overflow: hidden;
        }
        #board { width: min(340px, 100%); }

        .replay-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .replay-controls select {
            background: var(--bg-primary);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.8em;
            cursor: pointer;
            max-width: 180px;
            transition: border-color 0.2s;
        }
        .replay-controls select:hover { border-color: var(--accent); }
        .replay-controls select:focus { outline: none; border-color: var(--accent); }

        .btn-group {
            display: flex;
            gap: 2px;
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 2px;
            border: 1px solid var(--border);
        }
        .btn-group button {
            background: transparent;
            color: var(--text-muted);
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.15s;
        }
        .btn-group button:hover {
            background: var(--accent-glow);
            color: var(--accent-light);
        }
        .btn-group button:active,
        .btn-group button.active {
            background: var(--accent);
            color: white;
        }

        .game-info {
            font-size: 0.8em;
            color: var(--text-muted);
            text-align: center;
            padding: 8px 16px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border);
            min-width: 200px;
        }

        /* Move counter */
        .move-counter {
            font-size: 0.75em;
            color: var(--text-dim);
            text-align: center;
        }

        /* Footer status */
        .status-bar {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 0.75em;
            color: var(--text-dim);
            padding-top: 8px;
        }
        .status-bar .dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--success);
            margin-right: 6px;
            vertical-align: middle;
            animation: pulse 2s infinite;
        }
        .status-bar .dot.error { background: var(--danger); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            #board { width: 300px; }
        }
        @media (max-width: 600px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>Chess AI</span> Training Dashboard</h1>
        <div class="subtitle">AlphaZero-style self-play reinforcement learning</div>
        <div class="run-switcher">
            <label for="run-select">Run:</label>
            <select id="run-select"><option>Loading…</option></select>
        </div>
    </div>

    <div class="container">
        <div class="grid">
            <div class="stats-row">
                <div class="stat-box">
                    <div class="label">Generations</div>
                    <div class="value" id="stat-generations">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">Total Games</div>
                    <div class="value" id="stat-games">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">Positions</div>
                    <div class="value" id="stat-positions">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">Latest Loss</div>
                    <div class="value" id="stat-loss">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">Speed</div>
                    <div class="value" id="stat-speed">-</div>
                    <div class="unit">pos/min</div>
                </div>
                <div class="stat-box">
                    <div class="label">Network</div>
                    <div class="value" id="stat-network">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">Resign W</div>
                    <div class="value" id="stat-resign-w">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">Resign FP</div>
                    <div class="value" id="stat-resign-fp">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">Adjud. Rate</div>
                    <div class="value" id="stat-adjud">-</div>
                </div>
                <div class="stat-box">
                    <div class="label">Pool Size</div>
                    <div class="value" id="stat-pool">-</div>
                </div>
            </div>

            <div class="card">
                <h2>Training Loss<button class="card-action" id="copy-loss-text" title="Copy a markdown table + sparkline of all generations to clipboard">Copy as text</button></h2>
                <div class="chart-container">
                    <canvas id="lossChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>Game Replay</h2>
                <div id="board-container">
                    <div id="board"></div>
                    <div class="replay-controls">
                        <select id="gen-select"><option>No data</option></select>
                        <select id="game-select"><option>No data</option></select>
                    </div>
                    <div class="replay-controls">
                        <div class="btn-group">
                            <button id="btn-start" title="Start">&#x23EE;</button>
                            <button id="btn-prev" title="Previous">&lsaquo;</button>
                            <button id="btn-play" title="Play">&#9654;</button>
                            <button id="btn-next" title="Next">&rsaquo;</button>
                            <button id="btn-end" title="End">&#x23ED;</button>
                        </div>
                    </div>
                    <div class="game-info" id="game-info">No games loaded</div>
                </div>
            </div>

            <div class="card full-width">
                <h2>Game Results by Generation</h2>
                <div class="chart-container">
                    <canvas id="resultsChart"></canvas>
                </div>
            </div>

            <div class="status-bar" id="status"><span class="dot"></span>Connecting...</div>
        </div>
    </div>

<script>
// --- Chart.js global defaults for dark theme ---
Chart.defaults.color = '#8888a0';
Chart.defaults.borderColor = '#2a2a4a';

// Plugin: draws vertical lines at tier transitions / resume points.
// Reads marker list from chart.$eventMarkers (set by refresh()).
const eventMarkersPlugin = {
    id: 'eventMarkers',
    afterDatasetsDraw(chart) {
        const markers = chart.$eventMarkers || [];
        if (!markers.length) return;
        const {ctx, chartArea: {top, bottom}, scales: {x}} = chart;
        ctx.save();
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1.5;
        markers.forEach(function(m) {
            const px = x.getPixelForValue(m.index);
            ctx.strokeStyle = m.color;
            ctx.beginPath();
            ctx.moveTo(px, top);
            ctx.lineTo(px, bottom);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = m.color;
            ctx.font = '10px system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(m.label, px, top + 12);
            ctx.setLineDash([4, 4]);
        });
        ctx.restore();
    }
};

const lossCtx = document.getElementById('lossChart').getContext('2d');
const lossChart = new Chart(lossCtx, {
    type: 'line',
    plugins: [eventMarkersPlugin],
    data: {
        labels: [],
        datasets: [
            {
                label: 'Total Loss', data: [],
                borderColor: '#6c63ff', backgroundColor: 'rgba(108, 99, 255, 0.1)',
                borderWidth: 2.5, pointRadius: 4, pointHoverRadius: 6,
                pointBackgroundColor: '#6c63ff', tension: 0.3, fill: true
            },
            {
                label: 'Policy Loss', data: [],
                borderColor: '#ff6b6b', backgroundColor: 'rgba(255, 107, 107, 0.05)',
                borderWidth: 2, pointRadius: 3, pointHoverRadius: 5,
                pointBackgroundColor: '#ff6b6b', tension: 0.3, fill: false
            },
            {
                label: 'Value Loss', data: [],
                borderColor: '#4ecdc4', backgroundColor: 'rgba(78, 205, 196, 0.05)',
                borderWidth: 2, pointRadius: 3, pointHoverRadius: 5,
                pointBackgroundColor: '#4ecdc4', tension: 0.3, fill: false
            },
            {
                label: 'MLH Loss', data: [],
                borderColor: '#ffb84d', backgroundColor: 'rgba(255, 184, 77, 0.05)',
                borderWidth: 2, pointRadius: 3, pointHoverRadius: 5,
                pointBackgroundColor: '#ffb84d', tension: 0.3, fill: false
            },
        ]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
            x: {
                title: { display: true, text: 'Generation', font: { size: 11 } },
                grid: { color: 'rgba(255,255,255,0.04)' }
            },
            y: {
                title: { display: true, text: 'Loss', font: { size: 11 } },
                grid: { color: 'rgba(255,255,255,0.04)' },
                beginAtZero: true
            }
        },
        plugins: {
            legend: {
                labels: { usePointStyle: true, pointStyle: 'circle', padding: 16, font: { size: 11 } }
            },
            tooltip: {
                backgroundColor: '#1a1a30', titleColor: '#e8e8f0', bodyColor: '#8888a0',
                borderColor: '#2a2a4a', borderWidth: 1, cornerRadius: 8, padding: 12
            }
        }
    }
});

const resultsCtx = document.getElementById('resultsChart').getContext('2d');
const resultsChart = new Chart(resultsCtx, {
    type: 'bar',
    data: {
        labels: [],
        datasets: [
            { label: 'White wins', data: [], backgroundColor: 'rgba(78, 205, 196, 0.8)', borderRadius: 4 },
            { label: 'Draws', data: [], backgroundColor: 'rgba(136, 136, 160, 0.6)', borderRadius: 4 },
            { label: 'Black wins', data: [], backgroundColor: 'rgba(255, 107, 107, 0.8)', borderRadius: 4 },
        ]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
            x: {
                stacked: true,
                title: { display: true, text: 'Generation', font: { size: 11 } },
                grid: { display: false }
            },
            y: {
                stacked: true,
                title: { display: true, text: 'Games', font: { size: 11 } },
                grid: { color: 'rgba(255,255,255,0.04)' },
                beginAtZero: true,
                ticks: { stepSize: 1 }
            }
        },
        plugins: {
            legend: {
                labels: { usePointStyle: true, pointStyle: 'rect', padding: 16, font: { size: 11 } }
            },
            tooltip: {
                backgroundColor: '#1a1a30', titleColor: '#e8e8f0', bodyColor: '#8888a0',
                borderColor: '#2a2a4a', borderWidth: 1, cornerRadius: 8, padding: 12
            }
        }
    }
});

// --- Board setup ---
let board = Chessboard('board', {
    position: 'start',
    pieceTheme: '/static/img/pieces/{piece}.webp'
});
let currentMoves = [];
let currentMoveIdx = 0;
let playInterval = null;
let chess = new Chess();

// --- Replay controls ---
document.getElementById('btn-start').addEventListener('click', function() { goToMove(0); });
document.getElementById('btn-prev').addEventListener('click', function() { goToMove(currentMoveIdx - 1); });
document.getElementById('btn-next').addEventListener('click', function() { goToMove(currentMoveIdx + 1); });
document.getElementById('btn-end').addEventListener('click', function() { goToMove(currentMoves.length); });
document.getElementById('btn-play').addEventListener('click', togglePlay);

function goToMove(idx) {
    idx = Math.max(0, Math.min(idx, currentMoves.length));
    currentMoveIdx = idx;
    chess.reset();
    for (var i = 0; i < idx; i++) {
        chess.move(currentMoves[i], { sloppy: true });
    }
    board.position(chess.fen());
    var info = 'Move ' + idx + ' / ' + currentMoves.length;
    if (idx > 0) info += '  \u2014  ' + currentMoves[idx - 1];
    document.getElementById('game-info').textContent = info;

    // Update play button state
    var btn = document.getElementById('btn-play');
    if (idx >= currentMoves.length && playInterval) {
        clearInterval(playInterval);
        playInterval = null;
        btn.innerHTML = '&#9654;';
        btn.classList.remove('active');
    }
}

function togglePlay() {
    var btn = document.getElementById('btn-play');
    if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
        btn.innerHTML = '&#9654;';
        btn.classList.remove('active');
    } else {
        if (currentMoveIdx >= currentMoves.length) goToMove(0);
        btn.innerHTML = '&#9646;&#9646;';
        btn.classList.add('active');
        playInterval = setInterval(function() {
            if (currentMoveIdx >= currentMoves.length) {
                clearInterval(playInterval);
                playInterval = null;
                btn.innerHTML = '&#9654;';
                btn.classList.remove('active');
                return;
            }
            goToMove(currentMoveIdx + 1);
        }, 600);
    }
}

// --- Game selection ---
document.getElementById('gen-select').addEventListener('change', loadGeneration);
document.getElementById('game-select').addEventListener('change', loadGame);

var generationsData = {};

async function loadGeneration() {
    var gen = parseInt(document.getElementById('gen-select').value);
    if (isNaN(gen)) return;

    if (!generationsData[gen]) {
        var resp = await fetch('/api/generation/' + gen);
        if (!resp.ok) return;
        generationsData[gen] = await resp.json();
    }

    var data = generationsData[gen];
    var gameSelect = document.getElementById('game-select');
    gameSelect.innerHTML = '';
    data.games.forEach(function(g, i) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = 'Game ' + g.game_num + ': ' + g.result + ' (' + g.num_moves + ' plies)';
        gameSelect.appendChild(opt);
    });
    if (data.games.length > 0) loadGame();
}

function loadGame() {
    var gen = parseInt(document.getElementById('gen-select').value);
    var gameIdx = parseInt(document.getElementById('game-select').value);
    if (isNaN(gen) || isNaN(gameIdx)) return;

    var data = generationsData[gen];
    if (!data || !data.games[gameIdx]) return;

    var game = data.games[gameIdx];
    currentMoves = game.moves_uci || [];
    currentMoveIdx = 0;
    chess.reset();
    board.position('start');
    document.getElementById('game-info').textContent =
        game.result + '  \u2014  ' + game.num_moves + ' plies  \u2014  ' + game.duration_s.toFixed(1) + 's';

    if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
        document.getElementById('btn-play').innerHTML = '&#9654;';
        document.getElementById('btn-play').classList.remove('active');
    }
}

// --- Polling ---
var isConnected = false;
var latestGens = [];

// Build a plaintext "copy as text" summary: a sparkline of total-loss
// across all gens, plus a markdown table of recent generations. Pastes
// cleanly into Slack / GitHub / chat / docs.
function buildLossText(gens) {
    if (!gens || gens.length === 0) return 'No generations yet.';
    var losses = gens.map(function(g) { return g.training.total_loss; });
    var min = Math.min.apply(null, losses);
    var max = Math.max.apply(null, losses);
    var blocks = ['\u2581','\u2582','\u2583','\u2584','\u2585','\u2586','\u2587','\u2588'];
    var span = max - min || 1;
    var spark = losses.map(function(v) {
        var idx = Math.min(7, Math.max(0, Math.round((v - min) / span * 7)));
        return blocks[idx];
    }).join('');

    var minIdx = losses.indexOf(min);
    var maxIdx = losses.indexOf(max);
    var header = 'Training loss (gen ' + gens[0].generation + '\u2013' +
        gens[gens.length-1].generation + '): ' + spark + '\n' +
        'min ' + min.toFixed(3) + ' (gen ' + gens[minIdx].generation + ')' +
        ' \u2014 max ' + max.toFixed(3) + ' (gen ' + gens[maxIdx].generation + ')' +
        ' \u2014 now ' + losses[losses.length-1].toFixed(3) + '\n\n';

    // Markdown table of last 25 gens (or all if fewer). Keep it readable
    // in Slack/GitHub without wrapping. The Event column flags resume
    // boundaries and tier transitions so the loss numbers around them
    // can be read in context (a loss bump right after 'resume' or
    // 'tier' is expected, not a regression).
    var N = Math.min(25, gens.length);
    var recent = gens.slice(-N);
    var startIdx = gens.length - N;
    var lines = [
        '| Gen | Network | Games | Total | Policy | Value | MLH | Event |',
        '|-----|---------|-------|-------|--------|-------|-----|-------|'
    ];
    recent.forEach(function(g, i) {
        var absIdx = startIdx + i;
        var net = g.network ? (g.network.blocks + 'b' + g.network.filters + 'f') : '-';
        var t = g.training;
        var events = [];
        if (g.resumed) events.push('resume');
        var prev = absIdx > 0 ? gens[absIdx - 1] : null;
        if (prev && prev.network && g.network &&
            (prev.network.blocks !== g.network.blocks ||
             prev.network.filters !== g.network.filters)) {
            events.push('tier ' + prev.network.blocks + 'b' + prev.network.filters +
                '\u2192' + g.network.blocks + 'b' + g.network.filters);
        }
        lines.push('| ' + g.generation + ' | ' + net + ' | ' + g.num_games +
            ' | ' + t.total_loss.toFixed(3) +
            ' | ' + t.policy_loss.toFixed(3) +
            ' | ' + t.value_loss.toFixed(3) +
            ' | ' + (t.mlh_loss || 0).toFixed(3) +
            ' | ' + (events.join(', ') || '') + ' |');
    });
    if (gens.length > N) lines.unshift('(showing last ' + N + ' of ' + gens.length + ' generations)\n');
    return header + lines.join('\n');
}

document.getElementById('copy-loss-text').addEventListener('click', function() {
    var btn = this;
    var text = buildLossText(latestGens);
    // Prefer modern Clipboard API; fall back to a hidden textarea for
    // non-secure contexts (http://localhost works either way in Chrome).
    var onDone = function() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy as text'; btn.classList.remove('copied'); }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(onDone).catch(function() {
            fallbackCopy(text); onDone();
        });
    } else {
        fallbackCopy(text); onDone();
    }
});

function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
}

async function fetchSummary() {
    try {
        var resp = await fetch('/api/summary');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var data = await resp.json();
        updateDashboard(data);
        isConnected = true;
        var statusEl = document.getElementById('status');
        statusEl.innerHTML = '<span class="dot"></span>Live \u2014 ' +
            new Date().toLocaleTimeString();
    } catch (e) {
        isConnected = false;
        var statusEl = document.getElementById('status');
        statusEl.innerHTML = '<span class="dot error"></span>Disconnected \u2014 ' + e.message;
    }
}

function updateDashboard(data) {
    document.getElementById('stat-generations').textContent = data.total_generations || 0;
    document.getElementById('stat-games').textContent = data.total_games || 0;
    document.getElementById('stat-positions').textContent =
        (data.total_positions || 0).toLocaleString();

    var gens = data.generations || [];
    // Cache for the "Copy as text" button; avoids a second fetch on click.
    latestGens = gens;
    if (gens.length > 0) {
        var latest = gens[gens.length - 1];
        document.getElementById('stat-loss').textContent =
            latest.training.total_loss.toFixed(3);

        if (data.total_time_s > 0) {
            var posPerMin = (data.total_positions / data.total_time_s * 60).toFixed(0);
            document.getElementById('stat-speed').textContent = posPerMin;
        }

        var netEl = document.getElementById('stat-network');
        if (netEl) {
            if (latest.network) {
                netEl.textContent = latest.network.blocks + 'b' + latest.network.filters + 'f';
            } else {
                netEl.textContent = '-';
            }
        }

        // Stage 10: Lc0-parity operational metrics. Omitted fields render '-'.
        function setOp(id, val, fmt) {
            var el = document.getElementById(id);
            if (!el) return;
            el.textContent = (val === undefined || val === null) ? '-' : fmt(val);
        }
        setOp('stat-resign-w', latest.resign_w, function(v) { return v.toFixed(3); });
        setOp('stat-resign-fp', latest.resign_fp_rate, function(v) { return (v * 100).toFixed(1) + '%'; });
        setOp('stat-adjud', latest.adjudication_rate, function(v) { return (v * 100).toFixed(1) + '%'; });
        setOp('stat-pool', latest.discard_pool_size, function(v) { return v.toLocaleString(); });
    }

    // Loss chart
    lossChart.data.labels = gens.map(function(g) { return 'Gen ' + g.generation; });
    lossChart.data.datasets[0].data = gens.map(function(g) { return g.training.total_loss; });
    lossChart.data.datasets[1].data = gens.map(function(g) { return g.training.policy_loss; });
    lossChart.data.datasets[2].data = gens.map(function(g) { return g.training.value_loss; });
    lossChart.data.datasets[3].data = gens.map(function(g) { return g.training.mlh_loss || 0; });

    // Event markers: tier transitions (network size changed from prior gen)
    // and resumes (first gen after a --resume-from). Drawn as dashed vertical
    // lines on the loss chart by the eventMarkersPlugin.
    var markers = [];
    gens.forEach(function(g, i) {
        var prev = i > 0 ? gens[i - 1] : null;
        if (prev && prev.network && g.network &&
            (prev.network.blocks !== g.network.blocks ||
             prev.network.filters !== g.network.filters)) {
            markers.push({
                index: i,
                color: '#f4c430',
                label: prev.network.blocks + 'b' + prev.network.filters +
                       ' \u2192 ' + g.network.blocks + 'b' + g.network.filters
            });
        }
        if (g.resumed) {
            markers.push({index: i, color: '#b084ff', label: 'Resume'});
        }
    });
    lossChart.$eventMarkers = markers;
    lossChart.update();

    // Results chart
    resultsChart.data.labels = gens.map(function(g) { return 'Gen ' + g.generation; });
    resultsChart.data.datasets[0].data = gens.map(function(g) { return (g.results || {})['1-0'] || 0; });
    resultsChart.data.datasets[1].data = gens.map(function(g) { return (g.results || {})['1/2-1/2'] || 0; });
    resultsChart.data.datasets[2].data = gens.map(function(g) { return (g.results || {})['0-1'] || 0; });
    resultsChart.update();

    // Generation selector
    var genSelect = document.getElementById('gen-select');
    var firstVal = genSelect.options[0] ? genSelect.options[0].value : '';
    var needsRepopulate = genSelect.options.length !== gens.length ||
        isNaN(parseInt(firstVal));
    if (gens.length > 0 && needsRepopulate) {
        genSelect.innerHTML = '';
        gens.forEach(function(g) {
            var opt = document.createElement('option');
            opt.value = g.generation;
            opt.textContent = 'Generation ' + g.generation;
            genSelect.appendChild(opt);
        });
        genSelect.value = gens[gens.length - 1].generation;
        loadGeneration();
    }
}

// --- Run switcher ---
async function loadRuns() {
    try {
        var resp = await fetch('/api/runs');
        if (!resp.ok) return;
        var data = await resp.json();
        var sel = document.getElementById('run-select');
        sel.innerHTML = '';
        if (!data.runs || data.runs.length === 0) {
            sel.innerHTML = '<option>No runs found</option>';
            return;
        }
        data.runs.forEach(function(r) {
            var opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = r.name + '  (' + r.total_generations + ' gen' +
                (r.total_generations === 1 ? '' : 's') + ')';
            if (r.current) opt.selected = true;
            sel.appendChild(opt);
        });
    } catch (e) {}
}

document.getElementById('run-select').addEventListener('change', async function(e) {
    var id = e.target.value;
    try {
        var resp = await fetch('/api/runs/select', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id}),
        });
        if (!resp.ok) return;
        // Invalidate cached per-generation data and reset selectors, then refetch.
        generationsData = {};
        var genSelect = document.getElementById('gen-select');
        genSelect.innerHTML = '<option>Loading…</option>';
        var gameSelect = document.getElementById('game-select');
        gameSelect.innerHTML = '<option>Loading…</option>';
        await fetchSummary();
    } catch (err) {}
});

// Initial fetch + poll
loadRuns();
fetchSummary();
setInterval(fetchSummary, 10000);
</script>
